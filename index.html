<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .tool-card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 24px;
      max-width: 720px;
      margin: 0 auto 32px auto;
    }

    .tool-card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #a5b4fc;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      font-size: 0.875rem;
      padding: 12px;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #6366f1; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      padding: 9px 18px;
      border: none;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary   { background: #6366f1; color: #fff; }
    .btn-secondary { background: #8b5cf6; color: #fff; }
    .btn-clear     { background: #2d3148; color: #94a3b8; }
    .btn-copy      { background: #0ea5e9; color: #fff; }

    button:hover { opacity: 0.85; }

    .output-block {
      margin-top: 16px;
    }

    .output-label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .output-box {
      position: relative;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px 44px 12px 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.875rem;
      color: #a5f3a5;
      word-break: break-all;
      min-height: 48px;
      white-space: pre-wrap;
    }

    .copy-inline {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #1e2130;
      border: 1px solid #2d3148;
      color: #94a3b8;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .copy-inline:hover { color: #e2e8f0; border-color: #6366f1; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #22c55e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
    }

    .toast.show { opacity: 1; }

    .divider {
      border: none;
      border-top: 1px solid #2d3148;
      margin: 8px 0 16px;
    }
  </style>
</head>
<body>

<h1>Tools</h1>

<!-- ───── TOOL 1: List → Comma separated ───── -->
<div class="tool-card">
  <h2>Lista → Separado por comas</h2>
  <textarea id="t1-input" placeholder="Pegá los números, uno por línea..."></textarea>

  <div class="btn-row">
    <button class="btn-primary"   onclick="t1Convert('plain')">Sin comillas</button>
    <button class="btn-primary"   onclick="t1Convert('spaced')">Sin comillas + espacio</button>
    <button class="btn-secondary" onclick="t1Convert('quoted')">Con comillas simples</button>
    <button class="btn-clear"     onclick="t1Clear()">Limpiar</button>
  </div>

  <div class="output-block" id="t1-out-plain-wrap" style="display:none">
    <div class="output-label">Sin comillas</div>
    <div class="output-box" id="t1-out-plain">
      <span id="t1-out-plain-text"></span>
      <button class="copy-inline" onclick="copyEl('t1-out-plain')">copiar</button>
    </div>
  </div>

  <div class="output-block" id="t1-out-spaced-wrap" style="display:none">
    <div class="output-label">Sin comillas + espacio</div>
    <div class="output-box" id="t1-out-spaced">
      <span id="t1-out-spaced-text"></span>
      <button class="copy-inline" onclick="copyEl('t1-out-spaced')">copiar</button>
    </div>
  </div>

  <div class="output-block" id="t1-out-quoted-wrap" style="display:none">
    <div class="output-label">Con comillas simples</div>
    <div class="output-box" id="t1-out-quoted">
      <span id="t1-out-quoted-text"></span>
      <button class="copy-inline" onclick="copyEl('t1-out-quoted')">copiar</button>
    </div>
  </div>
</div>

<!-- ───── TOOL 2: Date format converter ───── -->
<div class="tool-card">
  <h2>Fecha M/D/YYYY → DD/MM/YYYY</h2>
  <textarea id="t2-input" placeholder="Pegá las fechas, una por línea...&#10;Ejemplo:&#10;2/6/2026&#10;11/3/2026"></textarea>

  <div class="btn-row">
    <button class="btn-primary" onclick="t2Convert()">Convertir</button>
    <button class="btn-clear"   onclick="t2Clear()">Limpiar</button>
  </div>

  <div class="output-block" id="t2-out-wrap" style="display:none">
    <div class="output-label">Resultado</div>
    <div class="output-box" id="t2-out">
      <span id="t2-out-text"></span>
      <button class="copy-inline" onclick="copyEl('t2-out')">copiar</button>
    </div>
  </div>
</div>

<!-- toast -->
<div class="toast" id="toast">¡Copiado!</div>

<script>
  function parseLines(id) {
    return document.getElementById(id).value
      .split('\n')
      .map(l => l.trim())
      .filter(l => l.length > 0);
  }

  function setOutput(wrapId, boxId, text) {
    document.getElementById(wrapId).style.display = 'block';
    document.getElementById(boxId + '-text').textContent = text;
  }

  function t1Convert(mode) {
    const nums = parseLines('t1-input');
    if (!nums.length) return;

    if (mode === 'plain') {
      setOutput('t1-out-plain-wrap', 't1-out-plain', nums.join(','));
    } else if (mode === 'spaced') {
      setOutput('t1-out-spaced-wrap', 't1-out-spaced', nums.join(', '));
    } else {
      setOutput('t1-out-quoted-wrap', 't1-out-quoted', nums.map(n => `'${n}'`).join(', '));
    }
  }

  function t1Clear() {
    document.getElementById('t1-input').value = '';
    ['t1-out-plain-wrap','t1-out-spaced-wrap','t1-out-quoted-wrap'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
    ['t1-out-plain-text','t1-out-spaced-text','t1-out-quoted-text'].forEach(id => {
      document.getElementById(id).textContent = '';
    });
  }

  function copyEl(id) {
    const text = document.getElementById(id + '-text').textContent;
    navigator.clipboard.writeText(text).then(showToast);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function t2Convert() {
    const lines = parseLines('t2-input');
    if (!lines.length) return;

    const results = lines.map(line => {
      const parts = line.split('/');
      if (parts.length !== 3) return line;
      const [m, d, y] = parts;
      return `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;
    });

    document.getElementById('t2-out-wrap').style.display = 'block';
    document.getElementById('t2-out-text').textContent = results.join('\n');
  }

  function t2Clear() {
    document.getElementById('t2-input').value = '';
    document.getElementById('t2-out-wrap').style.display = 'none';
    document.getElementById('t2-out-text').textContent = '';
  }
</script>
</body>
</html>
